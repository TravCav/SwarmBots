<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Swarm Bots - Additional Inputs & Outputs</title>
  <style>
    body {
      background-color: #000000;
      margin: 0px;
    }
    canvas, img {
      image-rendering: optimizeSpeed;
      image-rendering: -moz-crisp-edges;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: optimize-contrast;
      -ms-interpolation-mode: nearest-neighbor;
    }
    #mynetwork {
      position: absolute;
      top: 0;
      left: 0;
      width: 600px;
      height: 600px;
      border: 1px solid #000000;
    }
  </style>
  <!-- vis-network (only required if you want the optional diagram) -->
  <script src="vis-network.min.js"></script>
</head>
<body onload="drawNetwork()">
<canvas id="gridCanvas" width="1000" height="1000" onclick="toggleVis()"></canvas>
<div id="mynetwork" style="display:none"></div>

<script>
/* ==================== 1) POPULATION-SCALED MUTATION HELPER ==================== */
function getPopulationMutationScale(popSize) {
  if (popSize < 200) {
    return 1.0 + (popSize / 200);
  } else if (popSize < 500) {
    const fraction = (popSize - 200) / 300;
    return 2.0 + fraction;  // => up to 3.0
  } else {
    return 3.0;
  }
}

/* ==================== 2) NEURON CLASS ==================== */
class neuron {
  constructor(connectionCount) {
    // +1 for bias
    connectionCount += 1;
    this.label = "";
    this.value = 0;
    this.connections = [];
    for (let i = 0; i < connectionCount; i++) {
      // each element is [sourceNeuronIndex, weight]
      this.connections.push([i, 0]);
    }
  }
}

/* ==================== 3) BRAIN CLASS (10 outputs) ==================== */
class Brain {
  constructor() {
    // CHANGED: we had 12 inputs, now we add 5 new:
    //  - 1 for localDensity
    //  - 4 for relative velocities
    this.inputCount = 17;          // total input neurons
    this.hiddenCount = 1;          // you can change as desired
    this.outputCount = 10;         // 8 directions + 1 speed + 1 sleep

    const total = this.inputCount + this.hiddenCount + this.outputCount;
    this.neurons = new Array(total);

    for (let i = 0; i < total; i++) {
      this.neurons[i] = new neuron(total);
    }

    // Label last 10 neurons = 8 directions + speedMod + sleepToggle
    const last = total - 1;
    this.neurons[last].label     = "sleepToggle";     // index: total - 1
    this.neurons[last - 1].label = "speedMod";        // total - 2

    this.neurons[last - 2].label = "moveDownRight";   // total - 3
    this.neurons[last - 3].label = "moveDownLeft";    // total - 4
    this.neurons[last - 4].label = "moveUpRight";     // total - 5
    this.neurons[last - 5].label = "moveUpLeft";      // total - 6
    this.neurons[last - 6].label = "moveRight";       // total - 7
    this.neurons[last - 7].label = "moveLeft";        // total - 8
    this.neurons[last - 8].label = "moveDown";        // total - 9
    this.neurons[last - 9].label = "moveUp";          // total - 10
  }

  Copy(otherBrain) {
    while (this.neurons.length < otherBrain.neurons.length) {
      this.AddHiddenNeuron();
    }
    const minLen = Math.min(this.neurons.length, otherBrain.neurons.length);
    for (let ni = 0; ni < minLen; ni++) {
      const minConn = Math.min(
        this.neurons[ni].connections.length,
        otherBrain.neurons[ni].connections.length
      );
      for (let nc = 0; nc < minConn; nc++) {
        this.neurons[ni].connections[nc][1] =
          otherBrain.neurons[ni].connections[nc][1];
      }
    }
  }

  Mutate(popSize) {
    // skip inputs, pick random hidden or output
    const neuronIndex = Math.floor(
      Math.random() * (this.neurons.length - this.inputCount)
    ) + this.inputCount;

    // random connection
    const connectionIndex = Math.floor(
      Math.random() * this.neurons[neuronIndex].connections.length
    );

    const delta = Math.random() * 2 - 1;
    this.neurons[neuronIndex].connections[connectionIndex][1] += delta;

    // rare chance to reset
    if (Math.random() < 1e-7) {
      this.neurons[neuronIndex].connections[connectionIndex][1] = 0;
    }
  }

  AddHiddenNeuron() {
    const oldLen = this.neurons.length;
    const newLen = oldLen + 1;

    let newNeurons = new Array(newLen);
    for (let i = 0; i < oldLen; i++) {
      const oldN = this.neurons[i];
      const newN = new neuron(newLen);

      newN.label = oldN.label;
      newN.value = oldN.value;

      // copy old connections
      for (let j = 0; j < oldN.connections.length; j++) {
        newN.connections[j] = [...oldN.connections[j]];
      }
      newNeurons[i] = newN;
    }

    // create new hidden
    const hiddenN = new neuron(newLen);
    hiddenN.label = `Hidden ${this.hiddenCount + 1}`;
    newNeurons[oldLen] = hiddenN;

    this.hiddenCount++;
    this.neurons = newNeurons;
  }

  Processneurons() {
    // from first hidden to end
    for (let ni = this.inputCount; ni < this.neurons.length; ni++) {
      let sum = 0;
      const connCount = this.neurons[ni].connections.length;
      for (let ci = 0; ci < connCount - 1; ci++) {
        const srcIndex = this.neurons[ni].connections[ci][0];
        const weight = this.neurons[ni].connections[ci][1];
        sum += this.neurons[srcIndex].value * weight;
      }
      // bias
      sum += this.neurons[ni].connections[connCount - 1][1];
      this.neurons[ni].value = Math.tanh(sum);
    }
  }

  Restore() {
    const saved = JSON.parse(localStorage.getItem("reconnect"));
    if (!saved) return;
    if (this.neurons.length === saved.length) {
      for (let i = 0; i < this.neurons.length; i++) {
        if (
          this.neurons[i].connections.length === saved[i].connections.length
        ) {
          this.neurons[i].connections = saved[i].connections;
        }
      }
    }
  }

  Save() {
    localStorage.setItem("reconnect", JSON.stringify(this.neurons));
    const netDiv = document.getElementById("mynetwork");
    if (netDiv && netDiv.style.display === "block") {
      drawNetwork();
    }
  }
}

/* ==================== 4) DOT CLASS ==================== */
class Dot {
  constructor() {
    this.x = Math.random() * window.innerWidth;
    this.y = Math.random() * window.innerHeight;
    this.vector = { x: 0, y: 0 };
    this.color = { r: 127, g: 127, b: 127 };
    this.energy = 10;
    this.tickRate = 0.02;
    this.children = 0;
    this.generation = 0;
    this.consumed = false;

    // We'll store localDensity each frame
    this.localDensity = 0;  // NEW INPUT
    // We'll see if we have nearestPrey & Predator velocities in the next steps

    this.nearbyDistance = 50;
    this.nearestPrey = null;
    this.nearestPredator = null;

    // create brain
    this.brain = new Brain();
    this.brain.Restore();
    this.brain.Mutate(population.dots.length);

    // Label the 17 inputs:
    //  The original 12:
    this.brain.neurons[0].label  = "Energy";
    this.brain.neurons[1].label  = "Velocity X";
    this.brain.neurons[2].label  = "Velocity Y";
    this.brain.neurons[3].label  = "Dist Left";
    this.brain.neurons[4].label  = "Dist Right";
    this.brain.neurons[5].label  = "Dist Top";
    this.brain.neurons[6].label  = "Dist Bottom";
    this.brain.neurons[7].label  = "dx Prey";
    this.brain.neurons[8].label  = "dy Prey";
    this.brain.neurons[9].label  = "dx Predator";
    this.brain.neurons[10].label = "dy Predator";
    this.brain.neurons[11].label = "Predator Energy Diff";

    // NEW INPUTS:
    this.brain.neurons[12].label = "Local Density";
    // Relative velocity for Prey
    this.brain.neurons[13].label = "relVelPreyX";
    this.brain.neurons[14].label = "relVelPreyY";
    // Relative velocity for Predator
    this.brain.neurons[15].label = "relVelPredX";
    this.brain.neurons[16].label = "relVelPredY";
  }

  calculateRadius() {
    const minSize = 1;
    const maxSize = 5;
    const logE = Math.log(this.energy + 1);
    const scale = (maxSize - minSize) / Math.log(100 + 1);
    return Math.max(minSize, Math.min(maxSize, minSize + logE * scale));
  }

  CheckDots(neighbors) {
    let preyDist = Infinity;
    let predDist = Infinity;
    this.nearestPrey = null;
    this.nearestPredator = null;

    for (let entry of neighbors) {
      const other = entry.dotRef;
      if (other === this) continue;
      const dx = this.x - other.x;
      const dy = this.y - other.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (other.energy < this.energy) {
        // potential prey
        if (dist < preyDist) {
          preyDist = dist;
          this.nearestPrey = other;
        }
      } else if (other.energy > this.energy) {
        // potential predator
        if (dist < predDist) {
          predDist = dist;
          this.nearestPredator = other;
        }
      }
    }
  }

  CheckDeath() {
    return this.Consumed() || this.energy < 0 || this.WallDeath();
  }

  Consumed() {
    // predator on top => I'm consumed
    if (this.nearestPredator) {
      const dx = this.x - this.nearestPredator.x;
      const dy = this.y - this.nearestPredator.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 1) {
        if (this.energy < this.nearestPredator.energy) {
          this.energy = -1;
          this.consumed = true;
          return true;
        }
      }
    }
    // I'm on top of smaller => I eat them
    if (this.nearestPrey) {
      const dx = this.x - this.nearestPrey.x;
      const dy = this.y - this.nearestPrey.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 1) {
        this.energy += this.nearestPrey.energy;
        this.children++;
        if (this.energy > 100) this.energy = 100;
      }
    }
    return false;
  }

  CopyColor(dotToCopy) {
    do {
      this.color.r = this.boundValue(
        dotToCopy.color.r + Math.floor(Math.random() * 32 - 16)
      );
      this.color.g = this.boundValue(
        dotToCopy.color.g + Math.floor(Math.random() * 32 - 16)
      );
      this.color.b = this.boundValue(
        dotToCopy.color.b + Math.floor(Math.random() * 32 - 16)
      );
    } while (this.color.r + this.color.g + this.color.b < 127);
  }
  boundValue(val) {
    return Math.max(0, Math.min(255, val));
  }

  WallDeath() {
    return (
      this.x > ctx.canvas.width ||
      this.x < 1 ||
      this.y > ctx.canvas.height ||
      this.y < 1
    );
  }

  // ---------------------------
  // Movement using 10 outputs:
  // 8 directions, speedMod, sleepToggle
  // ---------------------------
  DoMovement(cWidth, cHeight) {
    this.GetInputs(cWidth, cHeight);
    this.brain.Processneurons();

    // indexes for last 10 outputs
    const n = this.brain.neurons.length;
    // from the end:
    const sleepToggle = this.brain.neurons[n - 1].value;    // moveDownRight is n-2, etc. 
    const speedMod    = this.brain.neurons[n - 2].value;

    const moveDownRight = this.brain.neurons[n - 3].value;
    const moveDownLeft  = this.brain.neurons[n - 4].value;
    const moveUpRight   = this.brain.neurons[n - 5].value;
    const moveUpLeft    = this.brain.neurons[n - 6].value;
    const moveRight     = this.brain.neurons[n - 7].value;
    const moveLeft      = this.brain.neurons[n - 8].value;
    const moveDown      = this.brain.neurons[n - 9].value;
    const moveUp        = this.brain.neurons[n - 10].value;

    // 1) Sleep logic
    if (sleepToggle > 0 && this.energy < 1) {
      // If "sleepToggle" > 0, Dot is sleeping: no movement
      // but let's do a small energy regeneration
      this.energy += 0.000005;  // arbitrary regeneration rate
      return;               // skip movement entirely
    }

    // 2) Blend directions
    const dirX =
      (moveRight     *  1) +
      (moveLeft      * -1) +
      (moveUpLeft    * -1) +
      (moveUpRight   *  1) +
      (moveDownLeft  * -1) +
      (moveDownRight *  1);

    const dirY =
      (moveDown      *  1) +
      (moveUp        * -1) +
      (moveUpLeft    * -1) +
      (moveUpRight   * -1) +
      (moveDownLeft  *  1) +
      (moveDownRight *  1);

    // 3) Speed Modulation
    // speedMod is [-1..1], let's map that to [0..2], or clamp
    const speedFactor = Math.max(0, Math.min(2, (speedMod + 1)));

    // update velocity
    this.vector.x += dirX * 0.1 * speedFactor;
    this.vector.y += dirY * 0.1 * speedFactor;

    // apply movement
    this.x += this.vector.x;
    this.y += this.vector.y;

    // energy drain
    const motionCost = Math.sqrt(this.vector.x**2 + this.vector.y**2) / 1000;
    this.energy -= this.tickRate + motionCost;
  }

  // NEW: GetInputs now includes localDensity & relative velocities
  GetInputs(cWidth, cHeight) {
    // Original 12:
    this.brain.neurons[0].value  = this.energy;
    this.brain.neurons[1].value  = this.vector.x;
    this.brain.neurons[2].value  = this.vector.y;
    this.brain.neurons[3].value  = this.x;               
    this.brain.neurons[4].value  = cWidth - this.x;      
    this.brain.neurons[5].value  = this.y;               
    this.brain.neurons[6].value  = cHeight - this.y;     

    if (this.nearestPrey) {
      this.brain.neurons[7].value = this.nearestPrey.x - this.x;
      this.brain.neurons[8].value = this.nearestPrey.y - this.y;
    } else {
      this.brain.neurons[7].value = 0;
      this.brain.neurons[8].value = 0;
    }

    if (this.nearestPredator) {
      this.brain.neurons[9].value  = this.nearestPredator.x - this.x;
      this.brain.neurons[10].value = this.nearestPredator.y - this.y;
      this.brain.neurons[11].value = this.nearestPredator.energy - this.energy;
    } else {
      this.brain.neurons[9].value  = 0;
      this.brain.neurons[10].value = 0;
      this.brain.neurons[11].value = 0;
    }

    // NEW INPUT #1: localDensity
    this.brain.neurons[12].value = this.localDensity;

    // NEW INPUTS #2-5: relative velocity
    //   Prey velocity minus my velocity
    if (this.nearestPrey) {
      this.brain.neurons[13].value = this.nearestPrey.vector.x - this.vector.x;
      this.brain.neurons[14].value = this.nearestPrey.vector.y - this.vector.y;
    } else {
      this.brain.neurons[13].value = 0;
      this.brain.neurons[14].value = 0;
    }
    //   Predator velocity minus my velocity
    if (this.nearestPredator) {
      this.brain.neurons[15].value = this.nearestPredator.vector.x - this.vector.x;
      this.brain.neurons[16].value = this.nearestPredator.vector.y - this.vector.y;
    } else {
      this.brain.neurons[15].value = 0;
      this.brain.neurons[16].value = 0;
    }
  }
}

/* ==================== 5) QUADTREE ==================== */
class Quadtree {
  constructor(boundary, capacity) {
    this.boundary = boundary;
    this.capacity = capacity;
    this.points = [];
    this.divided = false;
  }

  subdivide() {
    const x = this.boundary.x;
    const y = this.boundary.y;
    const w = this.boundary.w / 2;
    const h = this.boundary.h / 2;

    this.topLeft = new Quadtree({ x,         y,         w, h }, this.capacity);
    this.topRight = new Quadtree({ x: x + w, y,         w, h }, this.capacity);
    this.bottomLeft = new Quadtree({ x,      y: y + h,  w, h }, this.capacity);
    this.bottomRight = new Quadtree({ x: x + w, y: y + h, w, h }, this.capacity);

    this.divided = true;
  }

  contains(point) {
    return (
      point.x >= this.boundary.x &&
      point.x < this.boundary.x + this.boundary.w &&
      point.y >= this.boundary.y &&
      point.y < this.boundary.y + this.boundary.h
    );
  }

  intersects(r1, r2) {
    return !(
      r2.x > r1.x + r1.w ||
      r2.x + r2.w < r1.x ||
      r2.y > r1.y + r1.h ||
      r2.y + r2.h < r1.y
    );
  }

  containsPoint(rect, p) {
    return (
      p.x >= rect.x &&
      p.x <= rect.x + rect.w &&
      p.y >= rect.y &&
      p.y <= rect.y + rect.h
    );
  }

  insert(point) {
    if (!this.contains(point)) return false;

    if (this.points.length < this.capacity) {
      this.points.push(point);
      return true;
    } else {
      if (!this.divided) this.subdivide();
      if (this.topLeft.insert(point)) return true;
      if (this.topRight.insert(point)) return true;
      if (this.bottomLeft.insert(point)) return true;
      if (this.bottomRight.insert(point)) return true;
    }
  }

  query(range, found) {
    if (!found) found = [];
    if (!this.intersects(range, this.boundary)) {
      return found;
    } else {
      for (let p of this.points) {
        if (this.containsPoint(range, p)) {
          found.push(p);
        }
      }
      if (this.divided) {
        this.topLeft.query(range, found);
        this.topRight.query(range, found);
        this.bottomLeft.query(range, found);
        this.bottomRight.query(range, found);
      }
    }
    return found;
  }
}

/* ==================== 6) MAIN LOGIC ==================== */
let cvs = document.getElementById("gridCanvas");
let ctx = cvs.getContext("2d");
ctx.canvas.width = window.innerWidth;
ctx.canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
  ctx.canvas.width = window.innerWidth;
  ctx.canvas.height = window.innerHeight;
});

let population = {
  data: {
    mostChildren: 0,
    mostChildrenIndex: 0,
    previousMostChildrenIndex: 0
  },
  dots: []
};

const times = [];
let fps = 0;
let lastSaveTime = 0;

// Overcrowding constants
const CROWD_RADIUS = 25;
const CROWD_THRESHOLD = 8;
const CROWD_PENALTY = 0.1;

function AddDots(n) {
  for (let i = 0; i < n; i++) {
    population.dots.push(new Dot());
  }
}

/**
 * Copy brain/color and position from sourceDot into targetIndex.
 * @param {number} targetIndex
 * @param {Dot} sourceDot
 * @param {boolean} wasConsumed
 */
function CopyDot(targetIndex, sourceDot, wasConsumed = false) {
  let target = population.dots[targetIndex];

  target.brain.Copy(sourceDot.brain);
  target.CopyColor(sourceDot);

  let r = Math.random() * 50;
  let a = Math.random() * 6.28;
  target.x = Math.floor(r * Math.cos(a) + sourceDot.x);
  target.y = Math.floor(r * Math.sin(a) + sourceDot.y);
  target.x = Math.max(0, Math.min(ctx.canvas.width, target.x));
  target.y = Math.max(0, Math.min(ctx.canvas.height, target.y));

  target.vector.x = 0;
  target.vector.y = 0;
  target.energy = 5;
  target.children = 0;
  target.consumed = false;
  target.generation++;

  // optional: add hidden neuron if consumed
  if (wasConsumed && population.dots.length > 1000) {
    target.brain.AddHiddenNeuron();
  }

  // mutate new dot
  target.brain.Mutate(population.dots.length);
}

function DoTheThings() {
  const boundary = { x: 0, y: 0, w: ctx.canvas.width, h: ctx.canvas.height };
  let qt = new Quadtree(boundary, 8);

  for (let i = 0; i < population.dots.length; i++) {
    const d = population.dots[i];
    qt.insert({ x: d.x, y: d.y, dotRef: d });
  }

  population.data.mostChildren = 0;

  for (let i = 0; i < population.dots.length; i++) {
    const dot = population.dots[i];

    // normal neighbor search for nearest prey/pred
    const range = {
      x: dot.x - dot.nearbyDistance,
      y: dot.y - dot.nearbyDistance,
      w: dot.nearbyDistance * 2,
      h: dot.nearbyDistance * 2
    };
    let neighbors = qt.query(range);
    dot.CheckDots(neighbors);

    // Overcrowding => also track localDensity for each Dot
    const crowdRange = {
      x: dot.x - CROWD_RADIUS,
      y: dot.y - CROWD_RADIUS,
      w: CROWD_RADIUS * 2,
      h: CROWD_RADIUS * 2
    };
    let localNeighbors = qt.query(crowdRange);
    dot.localDensity = localNeighbors.length;  // NEW: store for input
    if (dot.localDensity > CROWD_THRESHOLD) {
      const over = dot.localDensity - CROWD_THRESHOLD;
      dot.energy -= over * CROWD_PENALTY;
    }

    // movement
    dot.DoMovement(ctx.canvas.width, ctx.canvas.height);

    if (dot.children > population.data.mostChildren) {
      population.data.mostChildrenIndex = i;
      population.data.mostChildren = dot.children;
    }
  }

  // best dot changed?
  if (
    population.data.mostChildrenIndex !==
    population.data.previousMostChildrenIndex
  ) {
    population.data.previousMostChildrenIndex =
      population.data.mostChildrenIndex;
    if (performance.now() - lastSaveTime > 5000) {
      population.dots[population.data.mostChildrenIndex].brain.Save();
      lastSaveTime = performance.now();
    }
  }

  // death checks
  let toRemove = [];
  for (let i = 0; i < population.dots.length; i++) {
    if (population.dots[i].CheckDeath()) {
      // if it was a top parent
      if (population.dots[i].children >= population.data.mostChildren) {
        if (performance.now() - lastSaveTime > 5000) {
          population.dots[i].brain.Save();
          lastSaveTime = performance.now();
        }
      }
      // consumed => copy from predator
      if (population.dots[i].consumed) {
        CopyDot(i, population.dots[i].nearestPredator, true);
      } else {
        // random pick replacement
        let pick = Math.floor(Math.random() * population.dots.length);
        CopyDot(i, population.dots[pick], false);
        toRemove.push(i);
      }
    }
  }

  // population control example
  if (fps > 30) {
    AddDots(1);
  }
  if (fps < 20 && population.dots.length > 100) {
    for (let idx of toRemove) {
      if (idx < population.dots.length) {
        population.dots.splice(idx, 1);
      }
    }
  }
}

function drawParticle(x, y, color, radius) {
  ctx.fillStyle = `rgb(${color.r}, ${color.g}, ${color.b})`;
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, 2*Math.PI);
  ctx.fill();
}

function highlightBestDot(dot) {
  if (!dot) return;
  const r = dot.calculateRadius() + 4;
  const pulse = Math.sin(performance.now() / 200) * 0.5 + 0.5;

  ctx.strokeStyle = `rgba(255,255,255,${0.3 + 0.7 * pulse})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(dot.x, dot.y, r, 0, 2 * Math.PI);
  ctx.stroke();

  ctx.fillStyle = "white";
  ctx.font = "12px Arial";
  ctx.fillText(`Best: ${dot.children} kids`, dot.x + r + 5, dot.y);
}

function RenderFrame() {
  ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);

  DoTheThings();

  // draw all dots
  for (let i = 0; i < population.dots.length; i++) {
    const d = population.dots[i];
    drawParticle(d.x, d.y, d.color, d.calculateRadius());
  }

  // track fps
  const now = performance.now();
  while (times.length > 0 && times[0] <= now - 1000) {
    times.shift();
  }
  times.push(now);
  fps = times.length;

  const netDiv = document.getElementById("mynetwork");
  if (netDiv.style.display === "block") {
    ctx.fillStyle = "white";
    ctx.fillText(
      "fps: " + fps + ", DotCount: " + population.dots.length,
      20,
      15
    );
    let bestDot = population.dots[population.data.mostChildrenIndex];
    highlightBestDot(bestDot);
  }

  requestAnimationFrame(RenderFrame);
}

// toggle network diagram
function toggleVis() {
  const netDiv = document.getElementById("mynetwork");
  if (netDiv.style.display === "none") {
    netDiv.style.display = "block";
    drawNetwork();
  } else {
    netDiv.style.display = "none";
  }
}

/* ========== VIS NETWORK DIAGRAM ========== */
function drawNetwork() {
  let cached = JSON.parse(localStorage.getItem("reconnect"));
  if (!cached) return;

  let nodes = [];
  let edges = [];
  const inputCount = 17;   // updated for new inputs
  const outputCount = 10;  // 8 directions + speedMod + sleepToggle
  const total = cached.length;

  for (let i = 0; i < total; i++) {
    let groupLabel = "";
    if (i < inputCount) groupLabel = "Input";
    else if (i >= inputCount && i < total - outputCount) groupLabel = "Hidden";
    else groupLabel = "Output";

    const nlabel = cached[i].label || `Neuron ${i}`;
    nodes.push({
      id: i,
      label: `${nlabel} (${groupLabel}) [${i}]`,
      group: groupLabel,
      font: { color: "white" }
    });
  }

  // show only positive edges for clarity
  for (let i = inputCount; i < total; i++) {
    for (let c = 0; c < cached[i].connections.length; c++) {
      const w = cached[i].connections[c][1];
      if (w > 0) {
        edges.push({
          from: c,
          to: i,
          value: Math.abs(w),
          arrows: "to"
        });
      }
    }
  }

  const container = document.getElementById("mynetwork");
  const data = { nodes, edges };
  const options = {
    nodes: { shape: "dot", size: 6 },
    edges: { smooth: false },
    physics: {
      forceAtlas2Based: {
        theta: 0.5,
        gravitationalConstant: -150,
        centralGravity: 0.03,
        springConstant: 0.04,
        springLength: 100,
        damping: 5
      },
      maxVelocity: 1046,
      solver: "forceAtlas2Based",
      timestep: 0.25,
      stabilization: { iterations: 0 }
    }
  };
  new vis.Network(container, data, options);
}

/* ==================== START ==================== */
AddDots(25);
// Prime the fps buffer
for (let i = 0; i < 120; i++) {
  times.push(performance.now());
}
requestAnimationFrame(RenderFrame);
